name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hi-pdf-parser
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib

          ref_name = os.environ["GITHUB_REF_NAME"]
          if not ref_name.startswith("v"):
              raise SystemExit(f"Release tag must start with 'v', got {ref_name!r}")

          tag_version = ref_name[1:]
          with open("pyproject.toml", "rb") as file:
              project_version = tomllib.load(file)["project"]["version"]

          if tag_version != project_version:
              raise SystemExit(
                  f"Tag version {tag_version!r} does not match "
                  f"pyproject.toml version {project_version!r}"
              )
          PY

      - name: Install build tooling
        run: python -m pip install --upgrade uv

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
